name: Enterprise Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Pre-build validation
        uses: destny69/package-modules/actions/pipeline-prechecks@v0.0.4
        with:
          fail-on-audit-warnings: true
          working-directory: .

      - name: Build application
        uses: destny69/package-modules/actions/build-project@v0.0.4
        with:
          working-directory: .
          build-folder: dist
          build-command: npm run build

      - name: Package and publish
        id: upload
        uses: destny69/package-modules/actions/zip-and-upload@v0.0.4
        with:
          build-folder: dist
          package-name: frontend
          github-token: ${{ secrets.TOKEN }}


