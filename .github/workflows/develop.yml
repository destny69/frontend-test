name: Enterprise Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Pre-build validation
        uses: destny69/actions/actions/pipeline-prechecks@v1
        with:
          fail-on-audit-warnings: true
          working-directory: .

      - name: Build application
        uses: destny69/actions/actions/build-project@v1
        with:
          working-directory: .
          build-folder: dist
          build-command: npm run build

      - name: Package and publish
        uses: destny69/actions/actions/zip-and-upload@v1
        with:
          build-folder: dist
          package-name: react-application
          github-token: ${{ secrets.TOKEN }}

      # REPLACED: Instead of deploying, upload the file to view/download it
      - name: Upload Zip for inspection
        uses: actions/upload-artifact@v4
        with:
          name: packaged-react-application # The name you'll see in the GitHub UI
          path: react-application.zip       # The path to the zip file created by the previous step
          if-no-files-found: error          # Fails the build if the file name/path is incorrect