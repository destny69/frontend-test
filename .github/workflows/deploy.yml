name: Manual Production Deployment

# This creates the manual "Run workflow" button in GitHub Actions
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Download the text file artifact containing the URL from the active run
      - name: Download URL Artifact
        uses: actions/download-artifact@v4
        with:
          name: package-url-artifact

      # 2. Read the text file back into an environment variable and use it
      - name: Read URL and Execute Deploy
        run: |
          PACKAGE_URL=$(cat package_url.txt)
          echo "Deploying artifact from URL: $PACKAGE_URL"
          
          # Add your custom curl or deployment commands here using $PACKAGE_URL