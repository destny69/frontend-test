name: PR Code & Security Check

on:
  pull_request:
    branches:
      - develop
      - staging
      - master

jobs:
  nextjs-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

      # - name: Secret scan
      #   uses: gitleaks/gitleaks-action@v2