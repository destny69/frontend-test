version: '3.8'

services:
  web-app:
    container_name: devine
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80" # Maps port 8080 on your host to port 80 inside the container
    volumes:
      - /var/www/html/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    restart: unless-stopped
    environment:
      - NODE_ENV=production
